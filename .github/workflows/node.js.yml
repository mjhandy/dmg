name: Deploy Angular App to GitHub Pages

on:
  push:
    branches:
      - dev  # Change to your default branch if different

permissions:
  contents: write  # Required for pushing to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Match your Angular project's Node version

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build Angular app
      - name: Build Angular app
        run: npm run build -- --configuration production --base-href "/dmg/"
        # Replace <REPO_NAME> with your GitHub repository name

      # 5. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        run: npx angular-cli-ghpages --dir=dist/dmg
        # Replace <PROJECT_NAME> with your Angular project folder name inside dist/
