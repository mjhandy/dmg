<div id="{{ silderID }}" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">
    @for ( review of data; track review; let i = $index){
    <div class="carousel-item" [class.active]="i === 0">
      <p class="copy">{{review.copy}}</p>
      <p class="name">{{ review.name }},<br>{{ review.title }}</p>
    </div>
    }
  </div>
  <div class="carousel-buttons">
    <button class="carousel-control-prev" type="button" attr.data-bs-target="#{{ silderID }}" data-bs-slide="prev">
      <mat-icon>chevron_left</mat-icon>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" attr.data-bs-target="#{{ silderID }}" data-bs-slide="next">
      <mat-icon>chevron_right</mat-icon>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
</div>
