<nav id="mainNav" class="navbar navbar-expand-lg fixed-top" #mainNav>
  <app-logo></app-logo>
  <button type="button" class="navbar-toggler" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar"
    aria-controls="offcanvasNavbar" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar">
    <div class="offcanvas-header">
      <button type="button" class="btn btn-icon" data-bs-dismiss="offcanvas" aria-label="Close" #closeButton>
        <mat-icon>close</mat-icon>
      </button>
    </div>
    <div class="offcanvas-body">
      <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
        @for ( route of routes; track route.title ) {
          @if (route.label !== 'Case Studies') {
            <li class="nav-item">
              <a [routerLink]="[route.path]" class="nav-link" routerLinkActive="active" (click)="closeMenu()">{{ route.label }}</a>
            </li>
          }
          @if (route.label === 'Case Studies') {
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" id="caseStudiesDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                {{ route.label }}
              </a>
              <ul class="dropdown-menu" aria-labelledby="caseStudiesDropdown">
                <li>
                  <a [routerLink]="['/case-studies']" class="dropdown-item" (click)="closeMenu()">Overview</a>
                </li>
                <li>
                  <a [routerLink]="['/case-studies/project-a']" class="dropdown-item" (click)="closeMenu()">Project A</a>
                </li>
                <li>
                  <a [routerLink]="['/case-studies/project-b']" class="dropdown-item" (click)="closeMenu()">Project B</a>
                </li>
              </ul>
            </li>
          }
        }

      </ul>
    </div>
  </div>

</nav>
