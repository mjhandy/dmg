<nav id="mainNav" class="navbar navbar-expand-lg bg-body-tertiary fixed-top" #mainNav>
  <app-logo></app-logo>
  <button type="button" class="navbar-toggler" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar"
    aria-controls="offcanvasNavbar" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar">
    <div class="offcanvas-header">
      <h3 id="offcanvasNavbarLabel">Dundee Media Group</h3>
      <button type="button" class="btn btn-icon" data-bs-dismiss="offcanvas" aria-label="Close">
        <mat-icon>close</mat-icon>
      </button>
    </div>
    <div class="offcanvas-body">
      <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
        @for ( route of routes; track route.title ){
        <li class="nav-item">
          <a [routerLink]="[route.path]" class="nav-link" routerLinkActive="active">{{ route.label }}</a>
        </li>
        }

      </ul>
    </div>
  </div>

</nav>
